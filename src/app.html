<!doctype html>
<html lang="en" data-theme="catppuccin" class="dark">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<script>
			// FOUC prevention. Mirrors mode-watcher's own logic so <html> is
			// set up correctly before hydration. Keep in sync with the
			// ThemeProvider config (storage keys, class names).
			(function () {
				try {
					var theme = localStorage.getItem('lunar-ui:theme') || '';
					var mode = localStorage.getItem('lunar-ui:mode') || 'system';
					var flavor = localStorage.getItem('lunar-ui:flavor');

					var isDark =
						mode === 'dark' ||
						(mode === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);

					// Compose data-theme with flavor suffix if pinned
					var dataTheme = flavor ? (theme || 'default') + '-' + flavor : theme;
					if (dataTheme) document.documentElement.dataset.theme = dataTheme;

					// Apply mode class + inline color-scheme
					var cls = flavor ? (flavor === 'latte' ? 'light' : 'dark') : isDark ? 'dark' : 'light';
					document.documentElement.classList.add(cls);
					document.documentElement.style.colorScheme = cls;
				} catch (_) {}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
